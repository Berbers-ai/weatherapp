<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Weer</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Weer">
<link rel="apple-touch-icon" href="./icons/icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #ffffff;
  --fg: #1A1A18;
  --muted: #9A9892;
  --accent: #2D5BE3;
  --card: #F4F4F2;
  --border: #E8E8E4;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--fg);
  min-height: 100dvh;
  overscroll-behavior: none;
}

/* ── LAYOUT ─────────────────────────── */
.app-wrapper { max-width: 960px; margin: 0 auto; padding: 0 16px; }

@media (min-width: 700px) {
  body { background: #EFEFED; }
  .app-wrapper { padding: 28px 28px 48px; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
  .col-left, .col-right { display: flex; flex-direction: column; gap: 16px; }
  .desktop-card { background: #fff; border-radius: 24px; padding: 22px; box-shadow: 0 2px 20px rgba(0,0,0,0.06); }
}
@media (max-width: 699px) {
  .two-col { display: block; }
  .col-left, .col-right { display: contents; }
  .desktop-card { display: contents; }
}

/* ── HEADER ─────────────────────────── */
.header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px 0 10px;
}
@media (min-width: 700px) { .header { padding: 0 0 8px; } }

.location-wrap { display: flex; flex-direction: column; gap: 3px; }
.location {
  display: flex; align-items: center; gap: 7px;
  font-size: 13px; font-weight: 500; color: var(--muted);
  letter-spacing: 0.06em; text-transform: uppercase;
}
.location-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; flex-shrink: 0; }
.last-updated { font-size: 10px; color: var(--muted); opacity: 0.65; padding-left: 13px; }

.header-btns { display: flex; gap: 8px; }
.icon-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--card); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--fg); transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn:hover { background: var(--border); }
.icon-btn:active { background: var(--border); }
.icon-btn.spinning svg { animation: spin 0.9s linear infinite; }

/* ── BANNERS ────────────────────────── */
.banner {
  border-radius: 12px; padding: 10px 14px;
  font-size: 12px; margin-bottom: 10px;
  display: none; align-items: center; gap: 10px;
}
.banner.show { display: flex; }
.offline-banner { background: #FFF3CD; color: #7A5C00; }
.install-banner { background: var(--card); color: var(--fg); }
.install-btn {
  margin-left: auto; flex-shrink: 0;
  background: var(--accent); color: #fff;
  border: none; border-radius: 8px; padding: 6px 14px;
  font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif;
}
.dismiss-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 20px; line-height: 1; flex-shrink: 0; }

/* ── SEARCH ─────────────────────────── */
.search-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 299; }
.search-backdrop.open { display: block; }

.search-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: var(--bg);
  padding: max(env(safe-area-inset-top, 0px), 20px) 20px 20px;
  display: none; flex-direction: column; gap: 12px;
}
.search-overlay.open { display: flex; }

@media (min-width: 700px) {
  .search-overlay {
    position: fixed; inset: auto;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 480px; max-height: 70vh;
    border-radius: 24px; box-shadow: 0 24px 80px rgba(0,0,0,0.15);
    padding: 24px;
  }
}

.search-bar {
  display: flex; align-items: center; gap: 10px;
  background: var(--card); border-radius: 14px; padding: 12px 16px;
  flex-shrink: 0;
}
.search-bar input {
  flex: 1; border: none; background: transparent;
  font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--fg); outline: none;
}
.search-bar input::placeholder { color: var(--muted); }
.search-close { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 13px; font-family: 'DM Sans', sans-serif; padding: 4px 8px; flex-shrink: 0; }
.search-results { display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
.search-result-item { padding: 14px 16px; background: var(--card); border-radius: 12px; cursor: pointer; font-size: 14px; transition: background 0.12s; }
.search-result-item:hover, .search-result-item:active { background: var(--border); }
.search-result-city { font-weight: 500; }
.search-result-country { color: var(--muted); font-size: 12px; margin-top: 2px; }
.search-hint { font-size: 13px; color: var(--muted); text-align: center; margin-top: 12px; }

/* ── LOADING / ERROR ────────────────── */
.loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 0; gap: 14px; }
.loader { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
.loading-text { font-size: 14px; color: var(--muted); font-family: 'DM Serif Display', serif; font-style: italic; }
.error-state { background: var(--card); border-radius: 18px; padding: 28px; margin: 20px 0; font-size: 14px; color: var(--muted); text-align: center; line-height: 1.7; }

/* ── HERO ───────────────────────────── */
.hero { padding: 20px 0 12px; position: relative; overflow: hidden; }
.condition-label { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 15px; color: var(--muted); margin-bottom: 4px; }
.temp-display { font-family: 'DM Serif Display', serif; font-size: 96px; line-height: 1; letter-spacing: -4px; color: var(--fg); }
.temp-display sup { font-size: 28px; letter-spacing: 0; vertical-align: super; margin-left: 2px; color: var(--muted); }
.feels-like { font-size: 13px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
.weather-icon-bg { position: absolute; right: -8px; top: 12px; font-size: 80px; opacity: 0.07; pointer-events: none; user-select: none; filter: grayscale(1); }

@media (min-width: 700px) {
  .temp-display { font-size: 108px; }
  .weather-icon-bg { font-size: 96px; }
}

/* ── STATS ──────────────────────────── */
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px; }
.stat-card { background: var(--card); border-radius: 16px; padding: 14px 12px; }
.stat-label { font-size: 10px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
.stat-value { font-size: 18px; font-family: 'DM Serif Display', serif; color: var(--fg); line-height: 1; }
.stat-unit { font-size: 11px; color: var(--muted); font-family: 'DM Sans', sans-serif; }

/* ── SECTION LABEL ──────────────────── */
.section-label { font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 9px; }

/* ── HOURLY ─────────────────────────── */
.hourly-scroll { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; margin-bottom: 4px; padding-bottom: 2px; }
.hourly-scroll::-webkit-scrollbar { display: none; }
@media (max-width: 699px) { .hourly-scroll { margin-left: -16px; margin-right: -16px; padding-left: 16px; padding-right: 16px; } }
.hour-card { background: var(--card); border-radius: 14px; padding: 12px 10px; min-width: 60px; text-align: center; flex-shrink: 0; transition: background 0.18s, color 0.18s; -webkit-tap-highlight-color: transparent; }
.hour-card.active { background: var(--fg); color: #fff; }
.hour-time { font-size: 10px; font-weight: 500; color: var(--muted); margin-bottom: 7px; }
.hour-card.active .hour-time { color: rgba(255,255,255,0.5); }
.hour-icon { font-size: 16px; margin-bottom: 6px; }
.hour-temp { font-size: 13px; font-family: 'DM Serif Display', serif; }
.hour-rain { font-size: 9px; color: var(--accent); margin-top: 3px; font-weight: 500; }
.hour-card.active .hour-rain { color: rgba(150,180,255,0.9); }

/* ── 7-DAY ──────────────────────────── */
.week-card { background: var(--card); border-radius: 18px; overflow: hidden; margin-bottom: 16px; }
.day-row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.day-row:last-child { border-bottom: none; }
.day-name { font-size: 13px; width: 46px; flex-shrink: 0; }
.day-icon { font-size: 16px; width: 26px; text-align: center; }
.temp-bar-bg { flex: 1; height: 4px; background: var(--border); border-radius: 2px; margin: 0 10px; position: relative; }
.temp-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; position: absolute; opacity: 0.65; }
.day-range { display: flex; gap: 7px; font-family: 'DM Serif Display', serif; font-size: 14px; min-width: 50px; justify-content: flex-end; }
.day-low { color: var(--muted); }

/* ── DETAIL GRID ────────────────────── */
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.detail-card { background: var(--card); border-radius: 16px; padding: 14px; }
.detail-label { font-size: 10px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
.detail-value { font-family: 'DM Serif Display', serif; font-size: 24px; line-height: 1; margin-bottom: 3px; }
.detail-sub { font-size: 11px; color: var(--muted); }

/* ── RAIN CHART ─────────────────────── */
.rain-card { background: var(--card); border-radius: 18px; padding: 14px 14px 12px; margin-bottom: 16px; }
.rain-bars { display: flex; gap: 5px; align-items: flex-end; height: 52px; margin-top: 10px; }
.rain-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
.rain-bar { width: 100%; background: var(--accent); border-radius: 3px 3px 2px 2px; opacity: 0.6; min-height: 3px; }
.rain-hour { font-size: 9px; color: var(--muted); font-weight: 500; }

/* ── ANIMATIONS ─────────────────────── */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.anim { animation: fadeUp 0.4s ease both; }
.a1{animation-delay:.03s} .a2{animation-delay:.08s}
.a3{animation-delay:.13s} .a4{animation-delay:.18s}
.a5{animation-delay:.23s} .a6{animation-delay:.28s}
</style>
</head>
<body>

<div class="search-backdrop" id="searchBackdrop"></div>

<div class="search-overlay" id="searchOverlay">
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="search-bar" style="flex:1">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9A9892" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="searchInput" type="text" placeholder="Zoek stad…" autocomplete="off">
    </div>
    <button class="search-close" id="searchClose">Annuleer</button>
  </div>
  <div class="search-results" id="searchResults">
    <div class="search-hint">Typ een stadsnaam</div>
  </div>
</div>

<div class="app-wrapper">
  <div class="header">
    <div class="location-wrap">
      <div class="location">
        <div class="location-dot"></div>
        <span id="locationName">Amsterdam</span>
      </div>
      <div class="last-updated" id="lastUpdated"></div>
    </div>
    <div class="header-btns">
      <button class="icon-btn" id="refreshBtn" title="Vernieuwen">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <button class="icon-btn" id="searchBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </div>
  </div>

  <div class="banner offline-banner" id="offlineBanner">📡 Geen verbinding — laatste data wordt getoond</div>
  <div class="banner install-banner" id="installBanner">
    <span>📲</span>
    <span>Installeer als app op je apparaat</span>
    <button class="install-btn" id="installBtn">Installeer</button>
    <button class="dismiss-btn" id="installDismiss">×</button>
  </div>

  <div id="weatherContent"></div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
let city = { name: 'Amsterdam', lat: 52.3676, lon: 4.9041, country: 'NL' };
let deferredPrompt = null;

// ── Service Worker ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(r => console.log('SW scope:', r.scope))
      .catch(e => console.warn('SW fout:', e));
  });
}

// ── Install ───────────────────────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});
window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.remove('show');
  deferredPrompt = null;
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').classList.remove('show');
});
document.getElementById('installDismiss').addEventListener('click', () =>
  document.getElementById('installBanner').classList.remove('show'));

// ── Offline ───────────────────────────────────────────────────────────────────
const checkOnline = () =>
  document.getElementById('offlineBanner').classList.toggle('show', !navigator.onLine);
window.addEventListener('online', checkOnline);
window.addEventListener('offline', checkOnline);
checkOnline();

// ── Helpers ───────────────────────────────────────────────────────────────────
const pad = n => n.toString().padStart(2, '0');
const fmtTime = iso => { if (!iso) return '--'; const d = new Date(iso); return pad(d.getHours()) + ':' + pad(d.getMinutes()); };
const DAYS = ['zo','ma','di','wo','do','vr','za'];

// ── WMO codes ─────────────────────────────────────────────────────────────────
const WMO = {
  0:{l:'Helder',i:'☀️'}, 1:{l:'Overwegend helder',i:'🌤️'}, 2:{l:'Gedeeltelijk bewolkt',i:'⛅'},
  3:{l:'Bewolkt',i:'☁️'}, 45:{l:'Mist',i:'🌫️'}, 48:{l:'IJsmist',i:'🌫️'},
  51:{l:'Lichte motregen',i:'🌦️'}, 53:{l:'Motregen',i:'🌦️'}, 55:{l:'Zware motregen',i:'🌧️'},
  61:{l:'Lichte regen',i:'🌦️'}, 63:{l:'Regen',i:'🌧️'}, 65:{l:'Zware regen',i:'🌧️'},
  71:{l:'Lichte sneeuw',i:'🌨️'}, 73:{l:'Sneeuw',i:'❄️'}, 75:{l:'Zware sneeuw',i:'❄️'},
  80:{l:'Lichte buien',i:'🌦️'}, 81:{l:'Buien',i:'🌧️'}, 82:{l:'Zware buien',i:'⛈️'},
  85:{l:'Sneeuwbuien',i:'🌨️'}, 95:{l:'Onweer',i:'⛈️'}, 96:{l:'Onweer met hagel',i:'⛈️'}, 99:{l:'Zwaar onweer',i:'🌩️'}
};
const wmo = c => WMO[c] || WMO[Math.floor(c/10)*10] || {l:'Onbekend',i:'🌡️'};

// ── API ───────────────────────────────────────────────────────────────────────
async function fetchWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
    + `&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,relative_humidity_2m,precipitation`
    + `&hourly=temperature_2m,weather_code,precipitation_probability,precipitation`
    + `&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,uv_index_max,visibility_mean,precipitation_sum`
    + `&wind_speed_unit=kmh&timezone=auto&forecast_days=7`;
  const r = await fetch(url);
  if (!r.ok) throw new Error();
  return r.json();
}
async function geocode(q) {
  const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5&language=nl&format=json`);
  return (await r.json()).results || [];
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(data) {
  const c = data.current, h = data.hourly, d = data.daily;
  const now = new Date();
  const nowIdx = Math.max(0, h.time.findIndex(t => new Date(t).getHours() === now.getHours()));

  // Hourly
  let hourlyH = '';
  for (let i = nowIdx; i < Math.min(nowIdx+10, h.time.length); i++) {
    const t = new Date(h.time[i]), w = wmo(h.weather_code[i]);
    const prob = h.precipitation_probability[i];
    hourlyH += `<div class="hour-card ${i===nowIdx?'active':''}">
      <div class="hour-time">${i===nowIdx?'Nu':pad(t.getHours())+':00'}</div>
      <div class="hour-icon">${w.i}</div>
      <div class="hour-temp">${Math.round(h.temperature_2m[i])}°</div>
      ${prob>10?`<div class="hour-rain">${prob}%</div>`:''}
    </div>`;
  }

  // 7-day
  const tMin = Math.min(...d.temperature_2m_min), tMax = Math.max(...d.temperature_2m_max), tR = tMax-tMin||1;
  let daysH = '';
  for (let i=0; i<7; i++) {
    const dt = new Date(d.time[i]), w = wmo(d.weather_code[i]);
    const lo = Math.round(d.temperature_2m_min[i]), hi = Math.round(d.temperature_2m_max[i]);
    daysH += `<div class="day-row">
      <div class="day-name">${i===0?'Vand.':DAYS[dt.getDay()]}</div>
      <div class="day-icon">${w.i}</div>
      <div class="temp-bar-bg"><div class="temp-bar-fill" style="left:${((lo-tMin)/tR*70).toFixed(1)}%;width:${(((hi-lo)/tR)*70+10).toFixed(1)}%"></div></div>
      <div class="day-range"><span class="day-low">${lo}°</span><span>${hi}°</span></div>
    </div>`;
  }

  // Rain
  const maxP = Math.max(...h.precipitation.slice(nowIdx, nowIdx+12), 0.1);
  let rainH = '';
  for (let i=nowIdx; i<Math.min(nowIdx+12, h.time.length); i++) {
    const t = new Date(h.time[i]);
    rainH += `<div class="rain-bar-wrap">
      <div class="rain-bar" style="height:${Math.max(4,(h.precipitation[i]/maxP)*100)}%"></div>
      <div class="rain-hour">${pad(t.getHours())}u</div>
    </div>`;
  }

  const curW = wmo(c.weather_code);
  const uv = Math.round(d.uv_index_max[0]);
  const uvLbl = uv<=2?'Laag':uv<=5?'Matig':uv<=7?'Hoog':'Zeer hoog';
  const vis = d.visibility_mean ? Math.round(d.visibility_mean[0]/1000)+'&nbsp;km' : '–';
  const precip = (d.precipitation_sum[0]||0).toFixed(1);

  document.getElementById('weatherContent').innerHTML = `
    <div class="two-col">
      <div class="col-left">
        <div class="desktop-card">
          <div class="hero anim a1">
            <div class="condition-label">${curW.l}</div>
            <div class="temp-display">${Math.round(c.temperature_2m)}<sup>°</sup></div>
            <div class="feels-like">Voelt als ${Math.round(c.apparent_temperature)}°&nbsp;&nbsp;·&nbsp;&nbsp;Hoog ${Math.round(d.temperature_2m_max[0])}°&nbsp;&nbsp;Laag ${Math.round(d.temperature_2m_min[0])}°</div>
            <div class="weather-icon-bg">${curW.i}</div>
          </div>
          <div class="stats-row anim a2">
            <div class="stat-card"><div class="stat-label">Wind</div><div class="stat-value">${Math.round(c.wind_speed_10m)}<span class="stat-unit"> km/u</span></div></div>
            <div class="stat-card"><div class="stat-label">Vochtig</div><div class="stat-value">${c.relative_humidity_2m}<span class="stat-unit">%</span></div></div>
            <div class="stat-card"><div class="stat-label">Neerslag</div><div class="stat-value">${precip}<span class="stat-unit"> mm</span></div></div>
          </div>
        </div>

        <div class="desktop-card anim a3">
          <div class="section-label">Per uur</div>
          <div class="hourly-scroll">${hourlyH}</div>
        </div>

        <div class="desktop-card anim a4">
          <div class="section-label">Neerslag vandaag</div>
          <div class="rain-bars" style="height:52px;display:flex;gap:5px;align-items:flex-end;margin-top:10px">${rainH}</div>
        </div>
      </div>

      <div class="col-right">
        <div class="desktop-card anim a3">
          <div class="section-label">7 dagen</div>
          <div class="week-card" style="background:transparent;border-radius:0;margin:0">${daysH}</div>
        </div>
        <div class="desktop-card anim a5">
          <div class="detail-grid" style="margin:0">
            <div class="detail-card"><div class="detail-label">Zonsopgang</div><div class="detail-value">${fmtTime(d.sunrise[0])}</div><div class="detail-sub">Ondergang ${fmtTime(d.sunset[0])}</div></div>
            <div class="detail-card"><div class="detail-label">UV-index</div><div class="detail-value">${uv}</div><div class="detail-sub">${uvLbl}</div></div>
            <div class="detail-card"><div class="detail-label">Zichtbaarheid</div><div class="detail-value">${vis}</div><div class="detail-sub">Vandaag</div></div>
            <div class="detail-card"><div class="detail-label">Luchtvochtigheid</div><div class="detail-value">${c.relative_humidity_2m}%</div><div class="detail-sub">Relatief</div></div>
          </div>
        </div>
      </div>
    </div>`;

  document.getElementById('lastUpdated').textContent =
    'Bijgewerkt ' + pad(now.getHours()) + ':' + pad(now.getMinutes());
}

// ── Load city ─────────────────────────────────────────────────────────────────
async function loadCity(c) {
  city = c;
  document.getElementById('locationName').textContent = c.name + (c.country ? ', ' + c.country : '');
  document.getElementById('weatherContent').innerHTML =
    `<div class="loading-state"><div class="loader"></div><div class="loading-text">Data ophalen…</div></div>`;
  document.getElementById('refreshBtn').classList.add('spinning');
  try {
    render(await fetchWeather(c.lat, c.lon));
  } catch {
    document.getElementById('weatherContent').innerHTML =
      `<div class="error-state">Kon geen weerdata ophalen.<br>Controleer je verbinding.</div>`;
  }
  document.getElementById('refreshBtn').classList.remove('spinning');
}

// ── Search ────────────────────────────────────────────────────────────────────
let searchTimer;
const $ = id => document.getElementById(id);

function openSearch() { $('searchOverlay').classList.add('open'); $('searchBackdrop').classList.add('open'); $('searchInput').focus(); }
function closeSearch() { $('searchOverlay').classList.remove('open'); $('searchBackdrop').classList.remove('open'); $('searchInput').value = ''; $('searchResults').innerHTML = '<div class="search-hint">Typ een stadsnaam</div>'; }

$('searchBtn').addEventListener('click', openSearch);
$('searchClose').addEventListener('click', closeSearch);
$('searchBackdrop').addEventListener('click', closeSearch);

$('searchInput').addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = $('searchInput').value.trim();
  if (q.length < 2) { $('searchResults').innerHTML = '<div class="search-hint">Typ een stadsnaam</div>'; return; }
  $('searchResults').innerHTML = '<div class="search-hint">Zoeken…</div>';
  searchTimer = setTimeout(async () => {
    try {
      const results = await geocode(q);
      if (!results.length) { $('searchResults').innerHTML = '<div class="search-hint">Geen resultaten</div>'; return; }
      $('searchResults').innerHTML = results.map(r =>
        `<div class="search-result-item" data-lat="${r.latitude}" data-lon="${r.longitude}" data-name="${r.name}" data-country="${r.country_code||''}">
          <div class="search-result-city">${r.name}</div>
          <div class="search-result-country">${[r.admin1,r.country].filter(Boolean).join(', ')}</div>
        </div>`).join('');
      $('searchResults').querySelectorAll('.search-result-item').forEach(el =>
        el.addEventListener('click', () => {
          loadCity({ name: el.dataset.name, lat: +el.dataset.lat, lon: +el.dataset.lon, country: el.dataset.country });
          closeSearch();
        })
      );
    } catch { $('searchResults').innerHTML = '<div class="search-hint">Zoekopdracht mislukt</div>'; }
  }, 380);
});

$('refreshBtn').addEventListener('click', () => loadCity(city));
loadCity(city);
</script>
</body>
